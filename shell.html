<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JNNCE Master of Computer Applications</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0B1F3A;
    }

    #siteFrame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }

    /* ── Music Button ── same look as individual pages */
    #shellMusicBtn {
      position: fixed;
      top: 1rem;
      left: 0.4rem;
      z-index: 9999;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid rgba(255, 193, 7, 0.75);
      background: rgba(11, 31, 58, 0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #FFC107;
      font-size: 0.82rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
      transition: background 0.28s ease, transform 0.2s ease, border-color 0.28s ease;
      outline: none;
    }

    #shellMusicBtn:hover {
      background: rgba(255, 193, 7, 0.18);
      border-color: #FFC107;
      transform: scale(1.08);
    }

    #shellMusicBtn.playing {
      animation: shellPulse 1.8s infinite;
      border-color: #FFC107;
    }

    @keyframes shellPulse {
      0% {
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35), 0 0 0 0 rgba(255, 193, 7, 0.30);
      }

      60% {
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35), 0 0 0 10px rgba(255, 193, 7, 0);
      }

      100% {
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35), 0 0 0 0 rgba(255, 193, 7, 0);
      }
    }

    /* Tooltip */
    #shellMusicBtn::after {
      content: attr(data-tip);
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%);
      background: rgba(11, 31, 58, 0.92);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 600;
      white-space: nowrap;
      padding: 3px 8px;
      border-radius: 5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s ease;
      border: 1px solid rgba(255, 193, 7, 0.25);
    }

    #shellMusicBtn:hover::after {
      opacity: 1;
    }

    @media (max-width: 768px) {
      #shellMusicBtn {
        top: auto !important;
        bottom: 30px !important;
        left: 30px !important;
        width: 45px !important;
        height: 45px !important;
        font-size: 1.1rem !important;
      }
      #shellMusicBtn::after {
        top: auto !important;
        bottom: calc(100% + 10px) !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
      }
      #shellMusicBtn:hover::after {
        top: auto !important;
        bottom: calc(100% + 12px) !important;
      }
    }

    @media (max-width: 480px) {
      #shellMusicBtn {
        bottom: 20px !important;
        left: 20px !important;
        width: 40px !important;
        height: 40px !important;
        font-size: 1rem !important;
      }
    }
  </style>
</head>

<body>

  <!-- ── Persistent audio — lives here, NEVER unloads ── -->
  <audio id="shellAudio" src="music.mpeg" preload="auto" loop></audio>

  <!-- Music toggle button (above the iframe) -->
  <button id="shellMusicBtn" data-tip="Play Music" aria-label="Toggle background music">
    <i class="fa-solid fa-music" id="shellMusicIcon"></i>
  </button>

  <!-- All site pages load inside this iframe — outer page never navigates -->
  <iframe src="index.html" id="siteFrame" name="siteFrame" title="JNNCE MCA" scrolling="yes"></iframe>

  <script>
    var audio = document.getElementById('shellAudio');
    var btn = document.getElementById('shellMusicBtn');
    var icon = document.getElementById('shellMusicIcon');

    audio.volume = 0.45;

    function setPlaying(play) {
      if (play) {
        audio.play().catch(function () { });
        btn.classList.add('playing');
        icon.className = 'fa-solid fa-pause';
        btn.setAttribute('data-tip', 'Pause Music');
      } else {
        audio.pause();
        btn.classList.remove('playing');
        icon.className = 'fa-solid fa-music';
        btn.setAttribute('data-tip', 'Play Music');
      }
    }

    btn.addEventListener('click', function () {
      setPlaying(audio.paused);
    });
  </script>

</body>

</html>
